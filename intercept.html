<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burp Intercept - LLM Research Proxy</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1800px; margin: 0 auto; }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #161b22;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #30363d;
        }
        .header h1 { color: #58a6ff; font-size: 1.4em; }
        .header p { color: #8b949e; font-size: 0.9em; margin-top: 5px; }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .mode-status {
            padding: 8px 16px;
            border-radius: 5px;
            font-weight: bold;
        }
        .mode-status.enabled { background: #238636; color: #fff; }
        .mode-status.disabled { background: #da3633; color: #fff; }
        .toggle-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .toggle-btn.enable { background: #238636; color: white; }
        .toggle-btn.enable:hover { background: #2ea043; }
        .toggle-btn.disable { background: #da3633; color: white; }
        .toggle-btn.disable:hover { background: #f85149; }

        /* Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }
        @media (max-width: 1200px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        /* Sidebar */
        .sidebar {
            background: #161b22;
            border-radius: 10px;
            border: 1px solid #30363d;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h2 { color: #58a6ff; font-size: 1em; }
        .refresh-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .refresh-btn:hover { background: #30363d; }
        .session-list {
            max-height: 70vh;
            overflow-y: auto;
        }
        .session-item {
            padding: 12px 15px;
            border-bottom: 1px solid #30363d;
            cursor: pointer;
            transition: background 0.2s;
        }
        .session-item:hover { background: #21262d; }
        .session-item.selected { background: #1f6feb33; border-left: 3px solid #58a6ff; }
        .session-item.pending { border-left: 3px solid #f0883e; }
        .session-id { color: #58a6ff; font-size: 0.85em; }
        .session-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 0.8em;
        }
        .session-endpoint { color: #8b949e; }
        .session-status {
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.75em;
        }
        .session-status.pending { background: #f0883e33; color: #f0883e; }
        .session-status.forwarded { background: #23863633; color: #3fb950; }
        .session-status.dropped { background: #da363333; color: #f85149; }
        .session-status.modified { background: #1f6feb33; color: #58a6ff; }

        /* Main Panel */
        .main-panel {
            background: #161b22;
            border-radius: 10px;
            border: 1px solid #30363d;
            padding: 20px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #30363d;
        }
        .panel-header h2 { color: #58a6ff; font-size: 1.2em; }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .action-btn.forward { background: #238636; color: white; }
        .action-btn.forward:hover { background: #2ea043; }
        .action-btn.drop { background: #da3633; color: white; }
        .action-btn.drop:hover { background: #f85149; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Editor */
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            height: calc(100vh - 300px);
            min-height: 400px;
        }
        @media (max-width: 1400px) {
            .editor-container { grid-template-columns: 1fr; }
        }
        .editor-panel {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .editor-header {
            padding: 10px 15px;
            background: #21262d;
            border-bottom: 1px solid #30363d;
            font-size: 0.85em;
            color: #8b949e;
        }
        .editor-header strong { color: #c9d1d9; }
        textarea.editor {
            flex: 1;
            width: 100%;
            background: #0d1117;
            color: #c9d1d9;
            border: none;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85em;
            resize: none;
            outline: none;
        }
        textarea.editor:focus { background: #161b22; }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }
        .empty-state h3 { margin-bottom: 10px; }
        .empty-state p { font-size: 0.9em; }

        /* Stats */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-item {
            background: #21262d;
            padding: 10px 20px;
            border-radius: 5px;
        }
        .stat-label { color: #8b949e; font-size: 0.8em; }
        .stat-value { color: #c9d1d9; font-weight: bold; margin-top: 3px; }
        .stat-value.highlight { color: #f0883e; }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 5px;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .notification.success { background: #238636; color: white; }
        .notification.error { background: #da3633; color: white; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>🔬 Burp Intercept - LLM Research Proxy</h1>
                <p>手动拦截和修改请求/响应 - 类似 Burp Suite</p>
            </div>
            <div class="mode-toggle">
                <span id="modeStatus" class="mode-status disabled">拦截模式：关闭</span>
                <button id="btnEnableMode" class="toggle-btn enable" onclick="setInterceptMode(true)">开启拦截</button>
                <button id="btnDisableMode" class="toggle-btn disable" onclick="setInterceptMode(false)" style="display:none;">关闭拦截</button>
            </div>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar" id="statsBar" style="display:none;">
            <div class="stat-item">
                <div class="stat-label">总会话数</div>
                <div class="stat-value" id="statTotal">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">等待中</div>
                <div class="stat-value highlight" id="statPending">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">已转发</div>
                <div class="stat-value" id="statForwarded">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">已丢弃</div>
                <div class="stat-value" id="statDropped">0</div>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>📋 拦截会话</h2>
                    <button class="refresh-btn" onclick="loadSessions()">↻ 刷新</button>
                </div>
                <div class="session-list" id="sessionList">
                    <div style="padding:20px;text-align:center;color:#8b949e;">
                        暂无会话
                    </div>
                </div>
            </div>

            <!-- Main Panel -->
            <div class="main-panel" id="mainPanel">
                <div class="empty-state">
                    <h3>👈 选择一个会话</h3>
                    <p>从左侧列表选择一个待处理的会话进行拦截和修改</p>
                    <p style="margin-top:15px;color:#58a6ff;">提示：先开启"拦截模式"，然后发送请求</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // State
        // =============================================
        let currentSessionId = null;
        let selectedSession = null;
        const API_BASE = window.location.origin;

        // =============================================
        // Intercept Mode Control
        // =============================================
        async function checkInterceptMode() {
            try {
                const res = await fetch(`${API_BASE}/intercept/mode`);
                const data = await res.json();

                const statusEl = document.getElementById('modeStatus');
                const btnEnable = document.getElementById('btnEnableMode');
                const btnDisable = document.getElementById('btnDisableMode');

                if (data.enabled) {
                    statusEl.textContent = '拦截模式：开启';
                    statusEl.className = 'mode-status enabled';
                    btnEnable.style.display = 'none';
                    btnDisable.style.display = 'inline-block';
                } else {
                    statusEl.textContent = '拦截模式：关闭';
                    statusEl.className = 'mode-status disabled';
                    btnEnable.style.display = 'inline-block';
                    btnDisable.style.display = 'none';
                }
            } catch (e) {
                console.error('Failed to check intercept mode:', e);
            }
        }

        async function setInterceptMode(enabled) {
            try {
                const endpoint = enabled
                    ? `${API_BASE}/intercept/mode/enable`
                    : `${API_BASE}/intercept/mode/disable`;

                await fetch(endpoint, { method: 'POST' });
                showNotification(enabled ? '拦截模式已开启' : '拦截模式已关闭', 'success');
                checkInterceptMode();
            } catch (e) {
                showNotification(`操作失败：${e.message}`, 'error');
            }
        }

        // =============================================
        // Session Management
        // =============================================
        async function loadSessions() {
            try {
                const res = await fetch(`${API_BASE}/intercept?limit=50`);
                const data = await res.json();

                // Update stats
                document.getElementById('statsBar').style.display = 'flex';
                document.getElementById('statTotal').textContent = data.stats.total_sessions || 0;
                document.getElementById('statPending').textContent = data.stats.pending || 0;
                document.getElementById('statForwarded').textContent = data.stats.by_status?.forwarded || 0;
                document.getElementById('statDropped').textContent = data.stats.by_status?.dropped || 0;

                // Update session list
                const listEl = document.getElementById('sessionList');
                if (data.sessions.length === 0) {
                    listEl.innerHTML = '<div style="padding:20px;text-align:center;color:#8b949e;">暂无会话</div>';
                    return;
                }

                listEl.innerHTML = data.sessions.map(s => `
                    <div class="session-item ${s.session_id === currentSessionId ? 'selected' : ''} ${s.status === 'pending' ? 'pending' : ''}"
                         onclick="selectSession('${s.session_id}')"
                         data-status="${s.status}">
                        <div class="session-id">📝 ${s.session_id}</div>
                        <div class="session-meta">
                            <span class="session-endpoint">${s.endpoint}</span>
                            <span class="session-status ${s.status}">${s.status}</span>
                        </div>
                        <div class="session-meta" style="margin-top:3px;color:#8b949e;">
                            ${new Date(s.created_at).toLocaleString()}
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load sessions:', e);
            }
        }

        async function selectSession(sessionId) {
            currentSessionId = sessionId;

            // Update selection styling
            document.querySelectorAll('.session-item').forEach(el => {
                el.classList.remove('selected');
                if (el.dataset.status === 'pending' && el.querySelector(`.session-id`).textContent.includes(sessionId)) {
                    el.classList.add('selected');
                }
            });

            try {
                const res = await fetch(`${API_BASE}/intercept/${sessionId}`);
                const data = await res.json();
                selectedSession = data;

                renderSessionEditor(data);
            } catch (e) {
                showNotification(`加载会话失败：${e.message}`, 'error');
            }
        }

        function renderSessionEditor(session) {
            const panelEl = document.getElementById('mainPanel');

            const requestContent = JSON.stringify(
                session.modified_request || session.original_request,
                null,
                2
            );

            const responseContent = session.modified_response || session.upstream_response
                ? JSON.stringify(
                    session.modified_response || session.upstream_response,
                    null,
                    2
                )
                : null;

            const isPendingRequest = session.status === 'pending' && !session.upstream_response;
            const isPendingResponse = session.status === 'waiting_response' || (session.upstream_response && session.status !== 'completed');

            panelEl.innerHTML = `
                <div class="panel-header">
                    <div>
                        <h2>📝 ${session.session_id}</h2>
                        <div style="color:#8b949e;font-size:0.85em;margin-top:5px;">
                            ${session.method} ${session.endpoint} | 状态：<span style="color:${getStatusColor(session.status)}">${session.status}</span>
                        </div>
                    </div>
                    <div class="action-buttons">
                        ${isPendingRequest || isPendingResponse ? `
                            <button class="action-btn forward" onclick="forwardSession('${session.session_id}')">
                                ▶ 转发 (Forward)
                            </button>
                            <button class="action-btn drop" onclick="dropSession('${session.session_id}')">
                                ⛔ 丢弃 (Drop)
                            </button>
                        ` : `
                            <button class="action-btn forward" onclick="forwardSession('${session.session_id}')" disabled>
                                已处理
                            </button>
                        `}
                    </div>
                </div>

                <div class="editor-container">
                    <div class="editor-panel">
                        <div class="editor-header">
                            <strong>📥 请求</strong>
                            ${session.modified_request ? ' (已修改)' : ' (原始)'}
                        </div>
                        <textarea class="editor" id="requestEditor">${escapeHtml(requestContent)}</textarea>
                    </div>
                    <div class="editor-panel">
                        <div class="editor-header">
                            <strong>📤 响应</strong>
                            ${responseContent
                                ? (session.modified_response ? ' (已修改)' : ' (上游)')
                                : (session.status === 'waiting_response' ? ' (等待拦截...)' : ' (等待中...)')}
                        </div>
                        <textarea class="editor" id="responseEditor" ${!responseContent ? 'disabled' : ''}>${responseContent ? escapeHtml(responseContent) : '等待上游响应...'}</textarea>
                    </div>
                </div>

                ${isPendingRequest ? `
                <div style="margin-top:15px;display:flex;gap:10px;">
                    <button class="action-btn forward" style="background:#1f6feb;" onclick="modifyAndForward('${session.session_id}', 'request')">
                        ✏️ 修改并转发请求
                    </button>
                </div>
                ` : ''}

                ${isPendingResponse && responseContent ? `
                <div style="margin-top:15px;display:flex;gap:10px;">
                    <button class="action-btn forward" style="background:#1f6feb;" onclick="modifyAndForward('${session.session_id}', 'response')">
                        ✏️ 修改并发送响应
                    </button>
                </div>
                ` : ''}
            `;
        }

        function getStatusColor(status) {
            const colors = {
                'pending': '#f0883e',
                'waiting_response': '#a371f7',  // Purple for waiting response
                'forwarded': '#3fb950',
                'dropped': '#f85149',
                'modified': '#58a6ff',
                'completed': '#238636',
            };
            return colors[status] || '#8b949e';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // =============================================
        // Actions
        // =============================================
        async function forwardSession(sessionId) {
            try {
                await fetch(`${API_BASE}/intercept/${sessionId}/forward`, { method: 'POST' });
                showNotification('已转发', 'success');
                setTimeout(() => loadSessions(), 500);
            } catch (e) {
                showNotification(`操作失败：${e.message}`, 'error');
            }
        }

        async function dropSession(sessionId) {
            try {
                await fetch(`${API_BASE}/intercept/${sessionId}/drop`, { method: 'POST' });
                showNotification('已丢弃', 'success');
                setTimeout(() => loadSessions(), 500);
                document.getElementById('mainPanel').innerHTML = `
                    <div class="empty-state">
                        <h3>👈 选择一个会话</h3>
                        <p>从左侧列表选择一个待处理的会话进行拦截和修改</p>
                    </div>
                `;
            } catch (e) {
                showNotification(`操作失败：${e.message}`, 'error');
            }
        }

        async function modifyAndForward(sessionId, type) {
            const editorId = type === 'request' ? 'requestEditor' : 'responseEditor';
            const content = document.getElementById(editorId).value;

            try {
                const parsed = JSON.parse(content);
                const endpoint = `${API_BASE}/intercept/${sessionId}/modify-${type}`;

                await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        [type === 'request' ? 'modified_request' : 'modified_response']: parsed,
                        action: type === 'request' ? 'forward' : 'send'
                    })
                });

                showNotification(`已修改并${type === 'request' ? '转发' : '发送'}`, 'success');
                setTimeout(() => {
                    loadSessions();
                }, 500);
            } catch (e) {
                showNotification(`JSON 格式错误：${e.message}`, 'error');
            }
        }

        // =============================================
        // Notification
        // =============================================
        function showNotification(message, type = 'success') {
            const el = document.createElement('div');
            el.className = `notification ${type}`;
            el.textContent = message;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        // =============================================
        // Auto-refresh
        // =============================================
        let isEditing = false;  // Track if user is editing

        // Track focus on editors
        document.addEventListener('focusin', (e) => {
            if (e.target.classList.contains('editor')) {
                isEditing = true;
            }
        });

        document.addEventListener('focusout', (e) => {
            if (e.target.classList.contains('editor')) {
                isEditing = false;
            }
        });

        setInterval(() => {
            if (!isEditing) {
                loadSessions();
                // Auto-refresh selected session if it's still active (pending, waiting_response, or forwarded without response)
                if (currentSessionId && selectedSession) {
                    const activeStatuses = ['pending', 'waiting_response', 'forwarded', 'modified'];
                    if (activeStatuses.includes(selectedSession.status)) {
                        selectSession(currentSessionId);  // Refresh selected session
                    }
                }
            }
        }, 3000);

        // Initialize
        checkInterceptMode();
        loadSessions();
    </script>
</body>
</html>
